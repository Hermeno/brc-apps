name: brazilianclean
region: nyc
services:
  - name: web
    github:
      repo: Hermeno/brc-apps
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    routes:
      - path: /
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXTAUTH_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXTAUTH_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
      - key: MAIL_MAILER
        scope: RUN_TIME
        value: smtp
      - key: MAIL_HOST
        scope: RUN_TIME
        type: SECRET
      - key: MAIL_PORT
        scope: RUN_TIME
        value: "587"
      - key: MAIL_USERNAME
        scope: RUN_TIME
        type: SECRET
      - key: MAIL_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: MAIL_FROM_NAME
        scope: RUN_TIME
        value: BrazilianClean
      - key: MAIL_FROM_ADDRESS
        scope: RUN_TIME
        value: no-reply@brazilianclean.org
    health_check:
      http_path: /api/health
